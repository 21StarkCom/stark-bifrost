name: Mirror to Infra-Group

on:
  schedule:
    - cron: "17 4 * * *" # daily
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-infra-group
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Push heads and tags to Infra-Group/bifrost
        env:
          DEPLOY_KEY: ${{ secrets.INFRA_GROUP_MIRROR_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          git push --force git@github.com:Infra-Group/bifrost.git 'refs/remotes/origin/*:refs/heads/*' 'refs/tags/*:refs/tags/*'
