name: web-deploy

on:
  push:
    branches: [main]
    paths: ['web/**', 'server/**', 'Dockerfile', 'index.json', 'bundles/**', '.github/workflows/web-deploy.yml']
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # keyless WIF auth to deploy the Cloud Run origin

# Deploy target — the static origin behind the ev-infra-group shared platform LB
# (marketplace.evinced-infra.group). Provisioned in ev-infra-group; see
# docs/web-hosting.md. Repo-level vars carry the env-specific WIF identity.
env:
  GCP_PROJECT_ID: ev-infra-group
  GCP_REGION: us-central1
  GAR_REPO: stark-marketplace
  CR_SERVICE: stark-marketplace
  RUNTIME_SA: stark-marketplace-run@ev-infra-group.iam.gserviceaccount.com
  # Opt into Node 24 for JS actions ahead of the Sep 2026 forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build the SPA + stage the engine output as one content-hashed unit ──
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build   # tsc --noEmit && vite build → web/dist with hashed assets
        working-directory: web
      # Stage the committed engine output INTO the same dist as the SPA so the
      # whole thing ships as one content-hashed unit (spec §10).
      - name: Stage index + per-bundle detail
        run: |
          set -euo pipefail
          mkdir -p web/dist/bundles
          cp index.json web/dist/index.json
          cp bundles/*.json web/dist/bundles/ 2>/dev/null || true
      - name: Upload SPA+index artifact (atomic unit)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

      # ── Build the image (Go static server + web/dist) and deploy to Cloud Run ──
      # Only on main / manual dispatch; requires the ev-infra-group identity
      # (CI SA + WIF + GAR + run.developer) to already be applied.
      - name: Authenticate to Google Cloud (WIF)
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - name: Set up gcloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2
      - name: Build + push image to Artifact Registry
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPO}/${CR_SERVICE}"
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
      - name: Deploy to Cloud Run (behind platform LB)
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPO}/${CR_SERVICE}:${GITHUB_SHA}"
          # No --allow-unauthenticated: the allUsers run.invoker binding is owned
          # by Terraform (ev-infra-group), so this run.developer SA never needs
          # run.setIamPolicy. ingress=internal-and-cloud-load-balancing blocks the
          # public *.run.app URL; public traffic enters through the platform LB.
          gcloud run deploy "${CR_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE}" \
            --service-account "${RUNTIME_SA}" \
            --ingress internal-and-cloud-load-balancing \
            --port 8080 \
            --cpu 1 --memory 256Mi \
            --min-instances 0 --max-instances 4 --concurrency 80 \
            --quiet
