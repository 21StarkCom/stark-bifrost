name: release

# Triggered when sign-manifest.yml pushes a v* tag. Builds cross-platform
# `stark` CLI binaries with goreleaser and appends them to the existing
# Release (which already holds the signed build-manifest assets).
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # upload binaries to the existing release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: build + publish stark CLI binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs tag history

      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
