# goreleaser config — builds the `stark` CLI for the three desktop platforms
# and APPENDS the binaries + a checksums file to the GitHub Release.
#
# Invoked in-workflow by sign-manifest.yml (NOT a separate `on: push: tags`
# workflow) because tags pushed by GITHUB_TOKEN don't trigger downstream
# workflows. Folding the build into sign-manifest keeps every signed release
# atomic: signed manifest + cross-platform binaries land together.
# mode: append preserves the build-manifest assets already on the release.
version: 2

project_name: stark

# goreleaser's default dist dir is `./dist`. The repo's committed
# `dist/claude` tree lives there, and `release --clean` would
# RemoveAll(./dist) — wiping the committed tree mid-workflow. Point
# goreleaser at a sibling so the two never collide.
dist: .goreleaser-dist

before:
  hooks:
    - go -C engine mod tidy

builds:
  - id: stark
    binary: stark
    main: ./cmd/stark
    dir: engine
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: stark
    name_template: "stark_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE*
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "stark_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true   # sign-manifest.yml already wrote the release notes from CHANGELOG.md

release:
  github:
    owner: GetEvinced
    name: stark-marketplace
  draft: false
  prerelease: auto
  mode: append   # APPEND binaries to the existing release (signed manifest already attached)
  name_template: "v{{ .Version }}"
